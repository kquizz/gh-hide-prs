<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 300px;
      margin: 0;
      padding: 14px 16px 16px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 2px;
    }
    .sub {
      color: #888;
      font-size: 11px;
      margin: 0 0 14px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }
    .row label { cursor: pointer; user-select: none; }
    hr { border: none; border-top: 1px solid #8884; margin: 14px 0; }
    .section-title { font-weight: 600; margin: 0 0 8px; }
    #labels { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #6e768133;
      border: 1px solid #6e768155;
      border-radius: 999px;
      padding: 2px 6px 2px 10px;
      font-size: 12px;
    }
    .chip button {
      border: none;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 0 2px;
      opacity: 0.6;
    }
    .chip button:hover { opacity: 1; }
    .add {
      display: flex;
      gap: 6px;
    }
    .add input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #8886;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      font: inherit;
    }
    .add button {
      padding: 5px 10px;
      border: 1px solid #8886;
      border-radius: 6px;
      background: #6e768122;
      color: inherit;
      cursor: pointer;
      font: inherit;
    }
    .add button:hover { background: #6e768144; }
    .empty { color: #888; font-size: 12px; font-style: italic; }
    body.off .dependent { opacity: 0.45; pointer-events: none; }
  </style>
</head>
<body>
  <h1>GitHub Hidden-PR Filter</h1>
  <p class="sub">Hides PRs from the Pull requests tab on tesla-site &amp; core-ui.</p>

  <div class="row">
    <input type="checkbox" id="enabled" />
    <label for="enabled"><strong>Enabled</strong></label>
  </div>

  <hr />

  <div class="dependent">
    <div class="row">
      <input type="checkbox" id="hideDrafts" />
      <label for="hideDrafts">Hide draft PRs</label>
    </div>

    <p class="section-title">Hide PRs with these labels</p>
    <div id="labels"></div>
    <div class="add">
      <input type="text" id="labelInput" placeholder="label name" aria-label="label name" />
      <button id="addLabel" type="button">Add</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
